<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <title>钩针图案绘制器</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-mark" src="assets/icon.png" alt="钩针图案绘制器图标" data-i18n-alt="appIconAlt">
        <div>
          <h1 data-i18n="appTitle">钩针图案绘制器</h1>
          <p data-i18n="tagline">符号图、配色、图例一屏完成</p>
        </div>
      </div>

      <section class="section">
        <div class="section-title" data-i18n="canvas">画布</div>
        <div class="field-grid">
          <label><span data-i18n="columns">列数</span>
            <input id="colsInput" type="number" min="4" max="80" value="24">
          </label>
          <label><span data-i18n="rows">行数</span>
            <input id="rowsInput" type="number" min="4" max="80" value="18">
          </label>
          <label><span data-i18n="cellSize">格子大小</span>
            <input id="cellInput" type="number" min="22" max="54" value="34">
          </label>
          <label><span data-i18n="numberSide">编号方向</span>
            <select id="numberMode">
              <option value="both" data-i18n="numberBoth">左右交替</option>
              <option value="right" data-i18n="numberRight">右侧</option>
              <option value="left" data-i18n="numberLeft">左侧</option>
              <option value="none" data-i18n="numberNone">隐藏</option>
            </select>
          </label>
        </div>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="stitches">针法</div>
        <div class="tools" id="toolPalette"></div>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="shape">形状</div>
        <div class="preset-tools" id="presetPalette"></div>
        <div style="height:10px"></div>
        <div class="field-grid">
          <label><span data-i18n="width">宽</span>
            <input id="presetColsInput" type="number" min="1" max="21" value="7">
          </label>
          <label><span data-i18n="height">高</span>
            <input id="presetRowsInput" type="number" min="1" max="21" value="7">
          </label>
        </div>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="colors">颜色</div>
        <div class="swatches" id="swatches"></div>
        <div style="height:10px"></div>
        <label><span data-i18n="customYarnColor">自定义线色</span>
          <input id="customColor" type="color" value="#2f7d78">
        </label>
      </section>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="icon-btn" id="undoBtn" title="撤销" aria-label="撤销" data-i18n-title="undo">
            <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-1"/></svg>
          </button>
          <button class="icon-btn" id="redoBtn" title="重做" aria-label="重做" data-i18n-title="redo">
            <svg viewBox="0 0 24 24"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h1"/></svg>
          </button>
          <button class="icon-btn" id="mirrorBtn" title="水平镜像" aria-label="水平镜像" data-i18n-title="mirror">
            <svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="m7 7-4 5 4 5V7Z"/><path d="m17 7 4 5-4 5V7Z"/></svg>
          </button>
          <button class="icon-btn" id="panBtn" title="拖动画布" aria-label="拖动画布" data-i18n-title="panCanvas">
            <svg viewBox="0 0 24 24"><path d="M7 11V7a2 2 0 1 1 4 0v4"/><path d="M11 10V6a2 2 0 1 1 4 0v5"/><path d="M15 11V8a2 2 0 1 1 4 0v7a6 6 0 0 1-6 6h-2a7 7 0 0 1-5.7-3L3 15a2 2 0 0 1 3.2-2.4L8 15"/><path d="M7 11v4"/></svg>
          </button>
          <button class="icon-btn" id="clearBtn" title="清空画布" aria-label="清空画布" data-i18n-title="clearCanvas">
            <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="m19 6-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
          </button>
        </div>
        <div class="toolbar-group">
          <button class="icon-btn" id="zoomOutBtn" title="缩小" aria-label="缩小" data-i18n-title="zoomOut">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M8 11h6"/><path d="m16 16 5 5"/></svg>
          </button>
          <div class="zoom-pill" id="zoomLabel">100%</div>
          <button class="icon-btn" id="zoomInBtn" title="放大" aria-label="放大" data-i18n-title="zoomIn">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M8 11h6"/><path d="M11 8v6"/><path d="m16 16 5 5"/></svg>
          </button>
        </div>
        <div class="toolbar-group">
          <button id="saveBtn" class="button-primary" data-i18n="save">保存</button>
          <button id="exportPngBtn" data-i18n="exportPng">导出 PNG</button>
          <button id="exportSvgBtn" data-i18n="exportSvg">导出 SVG</button>
        </div>
      </div>
      <div class="stage-wrap" id="stageWrap">
        <div class="stage" id="stage">
          <canvas id="chart" width="980" height="720"></canvas>
          <div class="status" id="status">准备绘制</div>
        </div>
      </div>
    </main>

    <aside class="inspector">
      <section class="section language-section">
        <label class="language-picker language-picker-panel"><span data-i18n="language">语言</span>
          <select id="languageSelect" class="language-select"></select>
        </label>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="project">作品</div>
        <label><span data-i18n="name">名称</span>
          <input id="titleInput" type="text" value="我的钩针图案">
        </label>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="legend">图例</div>
        <div class="legend" id="legend"></div>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="files">文件</div>
        <div class="actions">
          <button id="exportJsonBtn" data-i18n="exportJson">导出 JSON</button>
          <button id="importJsonBtn" data-i18n="importJson">导入 JSON</button>
          <input id="fileInput" class="hidden-file" type="file" accept="application/json,.json">
        </div>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="reference">参考图</div>
        <div class="actions two">
          <button id="uploadBgBtn" data-i18n="uploadImage">上传图片</button>
          <button id="clearBgBtn" data-i18n="clear">清除</button>
        </div>
        <input id="bgFileInput" class="hidden-file" type="file" accept="image/*">
        <div style="height:10px"></div>
        <div class="field-grid">
          <label><span data-i18n="opacity">透明度</span>
            <input id="bgOpacityInput" type="number" min="0" max="100" value="35">
          </label>
          <label><span data-i18n="scale">缩放</span>
            <input id="bgScaleInput" type="number" min="10" max="300" value="100">
          </label>
          <label><span data-i18n="offsetX">水平偏移</span>
            <input id="bgOffsetXInput" type="number" min="-2000" max="2000" value="0">
          </label>
          <label><span data-i18n="offsetY">垂直偏移</span>
            <input id="bgOffsetYInput" type="number" min="-2000" max="2000" value="0">
          </label>
        </div>
        <div style="height:8px"></div>
        <p class="note" id="bgInfoText">未加载参考图</p>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="quickActions">快速操作</div>
        <div class="actions two">
          <button id="fillRowBtn" data-i18n="fillCurrentRow">填满当前行</button>
          <button id="outlineBtn" data-i18n="markBorder">边框标记</button>
        </div>
      </section>

      <section class="section">
        <div class="section-title" data-i18n="status">状态</div>
        <p class="note" id="summaryText"></p>
      </section>
    </aside>
  </div>

  <script src="config/i18n.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
